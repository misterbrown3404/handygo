name: Flutter CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  handygo-ci:
    name: HandyGo App CI
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: 'stable'
          cache: true
      
      - name: Install Dependencies
        run: flutter pub get
        working-directory: handygo
        
      - name: Format Check
        run: dart format --set-exit-if-changed .
        working-directory: handygo
        continue-on-error: true # Don't fail the build on formatting
        
      - name: Analyze
        run: flutter analyze --no-fatal-infos
        working-directory: handygo
        
      - name: Build APK
        run: flutter build apk --release
        working-directory: handygo
        
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: handygo-apk
          path: handygo/build/app/outputs/flutter-apk/app-release.apk

  admin-ci:
    name: Admin Portal CI
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: 'stable'
          cache: true
      
      - name: Install Dependencies
        run: flutter pub get
        working-directory: handygo_admin
        
      - name: Analyze
        run: flutter analyze --no-fatal-infos
        working-directory: handygo_admin

  worker-ci:
    name: Worker App CI
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: 'stable'
          cache: true
      
      - name: Install Dependencies
        run: flutter pub get
        working-directory: handygo_worker
        
      - name: Analyze
        run: flutter analyze --no-fatal-infos
        working-directory: handygo_worker
